        // ---------------- MARQUEE BUILDER (all film names) ----------------
        function buildMarqueeContent() {
            const track = document.getElementById('marqueeTrack');
            if (!track) return;
            // Create a rich list with both English & Arabic names
            let itemsHtml = '';
            movies.forEach(movie => {
                itemsHtml += `
                    <div class="marquee-item">
                        <i class="fas fa-play-circle"></i>
                        <span class="film-name-en">${escapeHtml(movie.titleEn)}</span>
                        <span class="separator-dot">/</span>
                        <span class="film-name-ar">${escapeHtml(movie.titleAr)}</span>
                        <i class="fas fa-star" style="font-size: 0.65rem; opacity:0.6;"></i>
                    </div>
                `;
            });
            // Duplicate the entire list to create seamless infinite scroll effect
            const doubleItems = itemsHtml + itemsHtml;
            track.innerHTML = doubleItems;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // View counter logic (same as original)
        let viewCounts = {};
        let counterInterval;

        function initializeViewCounts() {
            movies.forEach(movie => {
                const baseViews = Math.floor(Math.random() * 15000) + 5000;
                const popularityBoost = movies.indexOf(movie) < 10 ? Math.floor(Math.random() * 20000) + 10000 : 0;
                viewCounts[movie.id] = baseViews + popularityBoost;
            });
        }

        function incrementViewCount(movieId) {
            const increment = Math.floor(Math.random() * 5) + 1;
            viewCounts[movieId] += increment;
        }

        function startAutoRefresh() {
            counterInterval = setInterval(() => {
                movies.forEach(movie => {
                    incrementViewCount(movie.id);
                });
                renderMovies();
            }, Math.random() * 10000 + 15000);
        }

        // DOM elements
        const moviesGrid = document.getElementById('moviesGrid');
        const modal = document.getElementById('videoModal');
        const closeModal = document.getElementById('closeModal');
        const modalVideo = document.getElementById('modalVideo');
        const modalMovieTitle = document.getElementById('modalMovieTitle');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const videoContainer = document.getElementById('videoContainer');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchStats = document.getElementById('searchStats');

        let currentFilter = 'all';
        let currentLanguage = 'en';
        let currentSearchQuery = '';

        let embedIframe = document.createElement('iframe');
        embedIframe.id = 'embedIframe';
        embedIframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        embedIframe.allowFullscreen = true;
        embedIframe.style.display = 'none';
        embedIframe.setAttribute('frameborder', '0');
        embedIframe.setAttribute('loading', 'lazy');
        videoContainer.appendChild(embedIframe);

        function getFilteredMovies() {
            let filtered = movies.filter(movie => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'en') return movie.lang === 'en' || movie.lang === 'both';
                if (currentFilter === 'ar') return movie.lang === 'ar' || movie.lang === 'both';
                return true;
            });
            if (currentSearchQuery.trim() !== '') {
                const query = currentSearchQuery.trim().toLowerCase();
                filtered = filtered.filter(movie => 
                    movie.titleEn.toLowerCase().includes(query) || 
                    movie.titleAr.toLowerCase().includes(query)
                );
            }
            return filtered;
        }

        function updateSearchStats(visibleCount) {
            if (currentSearchQuery.trim() === '') {
                searchStats.innerHTML = '';
                return;
            }
            const resultText = currentLanguage === 'en' 
                ? `Found ${visibleCount} movie${visibleCount !== 1 ? 's' : ''} matching "${escapeHtml(currentSearchQuery)}"`
                : `تم العثور على ${visibleCount} فيلماً تطابق "${escapeHtml(currentSearchQuery)}"`;
            searchStats.innerHTML = resultText;
        }

        function renderMovies() {
            const filteredMovies = getFilteredMovies();
            if (filteredMovies.length === 0) {
                moviesGrid.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-film-slash"></i>
                        <h3>${currentLanguage === 'en' ? 'No movies found' : 'لا توجد أفلام'}</h3>
                        <p>${currentLanguage === 'en' ? 'Try adjusting your search or filter.' : 'حاول تعديل البحث أو التصفية.'}</p>
                    </div>
                `;
                if (currentSearchQuery.trim() !== '') {
                    searchStats.innerHTML = currentLanguage === 'en' 
                        ? `No movies found for "${escapeHtml(currentSearchQuery)}"`
                        : `لم يتم العثور على أفلام لـ "${escapeHtml(currentSearchQuery)}"`;
                } else {
                    searchStats.innerHTML = '';
                }
                return;
            }
            updateSearchStats(filteredMovies.length);
            moviesGrid.innerHTML = filteredMovies.map(movie => {
                const displayTitle = currentLanguage === 'ar' ? movie.titleAr : movie.titleEn;
                const langClass = movie.lang === 'ar' ? 'ar' : (movie.lang === 'both' ? 'both' : 'en');
                const views = viewCounts[movie.id] || 0;
                return `
                    <div class="movie-card" onclick="playMovie('${movie.id}')">
                        <div class="video-thumbnail">
                            <img src="${movie.posterUrl}" alt="${displayTitle}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Poster'">
                            <div class="play-overlay">
                                <i class="fas fa-play-circle"></i>
                            </div>
                        </div>
                        <div class="movie-details">
                            <div class="movie-title">
                                <span>${displayTitle}</span>
                                <span class="movie-year">${movie.year}</span>
                            </div>
                            <div class="movie-meta">
                                <span class="lang-badge ${langClass}">
                                    ${movie.lang === 'en' ? 'EN' : movie.lang === 'ar' ? 'AR' : 'EN/AR'}
                                </span>
                                <span class="watch-counter" data-movie-id="${movie.id}">
                                    <i class="fas fa-eye"></i> ${views.toLocaleString()}
                                </span>
                                <i class="fas fa-video" style="color:#4CAF50;" title="video available"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.playMovie = function(movieId) {
            const movie = movies.find(m => m.id === movieId);
            if (!movie || !movie.videoUrl) {
                alert('No video available for this film yet.');
                return;
            }
            incrementViewCount(movieId);
            renderMovies();
            modal.classList.add('active');
            modalMovieTitle.textContent = currentLanguage === 'ar' ? movie.titleAr : movie.titleEn;
            modalVideo.style.display = 'none';
            modalVideo.pause();
            modalVideo.src = '';
            embedIframe.style.display = 'block';
            embedIframe.src = movie.videoUrl;
        };

        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            modalVideo.pause();
            modalVideo.src = '';
            modalVideo.style.display = 'none';
            embedIframe.src = '';
            embedIframe.style.display = 'none';
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal.click();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) closeModal.click();
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMovies();
            });
        });

        window.toggleLanguage = function() {
            currentLanguage = currentLanguage === 'en' ? 'ar' : 'en';
            document.getElementById('langDisplay').textContent = currentLanguage === 'en' ? 'EN | عربي' : 'عربي | EN';
            document.getElementById('libraryTitle').textContent = currentLanguage === 'en' ? 'Movie Library / مكتبة الأفلام' : 'مكتبة الأفلام / Movie Library';
            renderMovies();
        };

        function handleSearchInput() {
            currentSearchQuery = searchInput.value;
            clearSearchBtn.style.display = currentSearchQuery.length > 0 ? 'block' : 'none';
            renderMovies();
        }
        function clearSearch() {
            searchInput.value = '';
            currentSearchQuery = '';
            clearSearchBtn.style.display = 'none';
            renderMovies();
            searchInput.focus();
        }
        searchInput.addEventListener('input', handleSearchInput);
        clearSearchBtn.addEventListener('click', clearSearch);

        // Initialize everything
        initializeViewCounts();
        buildMarqueeContent();    // Populate marquee with all film names
        renderMovies();
        startAutoRefresh();
    })();
</script>
