<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badini · Movies - Watch</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0c0b14;
            color: #f0eef7;
            line-height: 1.5;
            padding: 2rem 1.5rem;
            direction: ltr;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* header */
        .badini-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid #2f2b45;
            padding-bottom: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: #e4b363;
        }

        .badini-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .badini-title span {
            color: #e4b363;
            font-weight: 300;
        }

        .lang-tag {
            background: #2f2b45;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            gap: 10px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
            border-left: 5px solid #e4b363;
            padding-left: 1rem;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #4b446b;
            color: #dbd4f5;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            border-color: #e4b363;
            color: #e4b363;
        }

        /* movies grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .movie-card {
            background: #1a1728;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #332e48;
            transition: 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: #e4b363;
            box-shadow: 0 10px 30px rgba(228, 179, 99, 0.15);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: #0c0b14;
            position: relative;
        }

        .video-thumbnail video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay i {
            font-size: 3rem;
            color: #e4b363;
            text-shadow: 0 2px 10px black;
        }

        .movie-details {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .movie-year {
            background: #2f2b45;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #b9b3d6;
        }

        .movie-meta {
            display: flex;
            gap: 1rem;
            margin: 0.8rem 0;
            color: #a29cc0;
            font-size: 0.9rem;
        }

        .lang-badge {
            background: #e4b363;
            color: #12101c;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .lang-badge.ar {
            background: #1e9c8d;
        }

        .lang-badge.both {
            background: #9b87e0;
        }

        /* video player modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: white;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
        }

        .close-modal:hover {
            color: #e4b363;
        }

        .video-container {
            width: 100%;
            height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-container video {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
        }

        /* filter tabs */
        .filter-btn.active {
            background: #e4b363;
            color: #12101c;
            border-color: #e4b363;
        }
        
        .filter-btn.active:hover {
            background: #f7c579;
        }

        .filter-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        #modalVideo {
            width: 100%;
            height: auto;
            max-height: 80vh;
        }
        
        .video-thumbnail video {
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- header -->
    <div class="badini-header">
        <div class="logo-area">
            <i class="fas fa-film logo-icon"></i>
            <div class="badini-title">Badini<span>Movies</span></div>
        </div>
        <div class="lang-tag">
            <i class="fas fa-globe"></i>
            <span>EN</span> <span style="color:#b9b3d6;">|</span> <span style="font-family:Tahoma;">عربي</span>
        </div>
    </div>

    <!-- movies library section -->
    <div class="section-title">
        <i class="fas fa-film"></i> Movie Library / مكتبة الأفلام
    </div>

    <!-- filter tabs -->
    <div class="filter-container">
        <button class="btn-secondary filter-btn active" data-filter="all">All / الكل</button>
        <button class="btn-secondary filter-btn" data-filter="en">English</button>
        <button class="btn-secondary filter-btn" data-filter="ar">العربية</button>
    </div>

    <!-- movies grid -->
    <div class="movies-grid" id="moviesGrid">
        <!-- movies will be dynamically inserted here -->
    </div>

    <!-- video player modal -->
    <div class="modal" id="videoModal">
        <div class="modal-header">
            <h2 id="modalMovieTitle">Now Playing</h2>
            <button class="close-modal" id="closeModal">&times;</button>
        </div>
        <div class="video-container" id="videoContainer">
            <video id="modalVideo" controls controlsList="nodownload">
                <source src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>
</div>

<script>
    (function() {
        // Movie database
        let movies = [
            {
                id: '1',
                titleEn: 'The Aftermath 2019',
                titleAr: ' The Afterman 2024',
                year: '2024',
                lang: 'both',
                videoUrl: 'https://eg27g2dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/v/03/00094/kikgiwpj8kkj_n/[Cimawbas].Aftermath.2024.mp4?t=5tUmYYr5PjeHLcWkcbZ7lQ9oVd-akuAj8VF6eBrx-zw&s=1773260986&e=43200&f=474636&sp=150&i=0.0',
                posterUrl: 'https://observer.com/wp-content/uploads/sites/2/2019/03/aftermath-dom-ta_03670_rgb-1.jpg'
            },
            {
                id: '2',
                titleEn: 'The Afterman 2024',
                titleAr: 'مشاهدة',
                year: '2022',
                lang: 'both',
                videoUrl: ' https://eg27g2dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/v/03/00094/kikgiwpj8kkj_n/[Cimawbas].Aftermath.2024.mp4?t=5tUmYYr5PjeHLcWkcbZ7lQ9oVd-akuAj8VF6eBrx-zw&s=1773260986&e=43200&f=474636&sp=150&i=0.0',
                posterUrl: 'https://upload.wikimedia.org/wikipedia/en/1/13/Aftermath2024.jpg'
            },
            {
                id: '3',
                titleEn: '7G 2024',
                titleAr: 'مشاهدة فلم ٥جي',
                year: '2023',
                lang: 'both',
                videoUrl: 'https://egyy41dffdvwerwe432vxcvxcvbcx321scvxv45cdsw1dfdsfsd.visitmycityfor365days.online/v/01/00100/bimqqg0h2rmi_n/[Cimawbas]7G.2024.2024.Tamil..mp4?t=bVXLuxGJSlfv2c3BeU_7ddFvzcjzg4Gvz2znb90oVsE&s=1773261523&e=43200&f=504604&sp=150&i=0.0',
                posterUrl: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgJ_PpLsEjZRoNh86YY9mlAl3AjJtoN_FwLmzCAZyNKA&s=10'
            },
            {
                id: '4',
                titleEn: 'Terrifier 2017 ',
                titleAr:'الموت',
                year: '2023',
                lang: 'both',
                videoUrl: 'https://vsped-fs11-u3z.cdnz.quest/v/01/00193/xezpn5cajs17_n/Terrifier.2017.1080p.WEB-DL.mp4?t=InG9c3I86DJP1qClzzvEJkrslC98GxkDC8b_aXftWcI&s=1773261947&e=43200&v=1373865&sp=10240&i=0.0',
                posterUrl: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSlHm-l8u9zAAO6KaeKey1Ivy7L-C5H7ksmTvmYUIByjw&s=10'
            },

{
                id: '5',
                titleEn: 'Fear Farm 2 2022',
                titleAr:'الموت',
                year: '2023',
                lang: 'both',
                videoUrl: 'https://vsped-fs11-u3z.cdnz.quest/v/04/00175/05fd96u1n2mi_n/Fear.Pharm.2.2022.mp4?t=csfjMQMGgd5n4hYM48uTEUE0z02wPdFFmfBmpDUrHd4&s=1773265309&e=43200&v=1690365&sp=10240&i=0.0',
                posterUrl: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIWWgz8DbkZO0q0DnBNOnT8Nrfl3Iu1v8ffMw1IBK21A&s=10'
            }



        ];

        // DOM elements
        const moviesGrid = document.getElementById('moviesGrid');
        const modal = document.getElementById('videoModal');
        const closeModal = document.getElementById('closeModal');
        const modalVideo = document.getElementById('modalVideo');
        const modalMovieTitle = document.getElementById('modalMovieTitle');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let currentFilter = 'all';

        // Render movies grid
        function renderMovies() {
            const filteredMovies = movies.filter(movie => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'en') return movie.lang === 'en' || movie.lang === 'both';
                if (currentFilter === 'ar') return movie.lang === 'ar' || movie.lang === 'both';
                return true;
            });

            moviesGrid.innerHTML = filteredMovies.map(movie => {
                const displayTitle = currentFilter === 'ar' ? movie.titleAr : movie.titleEn;
                const langClass = movie.lang === 'ar' ? 'ar' : (movie.lang === 'both' ? 'both' : 'en');
                
                return `
                    <div class="movie-card" onclick="playMovie('${movie.id}')">
                        <div class="video-thumbnail">
                            ${movie.videoUrl ? 
                                `<video src="${movie.videoUrl}" ${movie.posterUrl ? `poster="${movie.posterUrl}"` : ''}></video>` : 
                                `<div style="width:100%; height:100%; background: linear-gradient(45deg, #2f2b45, #1a1728); display: flex; align-items: center; justify-content: center;">
                                    <i class="fas fa-film" style="font-size: 3rem; color: #4b446b;"></i>
                                </div>`
                            }
                            <div class="play-overlay">
                                <i class="fas fa-play-circle"></i>
                            </div>
                        </div>
                        <div class="movie-details">
                            <div class="movie-title">
                                <span>${displayTitle}</span>
                                <span class="movie-year">${movie.year}</span>
                            </div>
                            <div class="movie-meta">
                                <span class="lang-badge ${langClass}">
                                    ${movie.lang === 'en' ? 'EN' : movie.lang === 'ar' ? 'AR' : 'EN/AR'}
                                </span>
                                ${movie.videoUrl ? '<i class="fas fa-video" style="color:#4CAF50;" title="video available"></i>' : '<i class="fas fa-video" style="color:#666;" title="video coming soon"></i>'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Play movie function (make it global)
        window.playMovie = function(movieId) {
            const movie = movies.find(m => m.id === movieId);
            if (!movie || !movie.videoUrl) {
                alert('No video available for this film yet.');
                return;
            }

            modal.classList.add('active');
            modalMovieTitle.textContent = currentFilter === 'ar' ? movie.titleAr : movie.titleEn;
            modalVideo.src = movie.videoUrl;
            modalVideo.load();
            modalVideo.play();
        };

        // Close modal
        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            modalVideo.pause();
            modalVideo.src = '';
        });

        // Click outside to close
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal.click();
            }
        });

        // Filter functionality
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMovies();
            });
        });

        // Initial render
        renderMovies();
    })();
</script>
</body>
</html>
