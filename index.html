        // view counters
        let viewCounts = {};
        let counterInterval;

        function initializeViewCounts() {
            moviesData.forEach(movie => {
                const baseViews = Math.floor(Math.random() * 15000) + 5000;
                viewCounts[movie.id] = baseViews + (moviesData.indexOf(movie) < 10 ? Math.floor(Math.random() * 20000) + 10000 : 0);
            });
        }
        function incrementViewCount(movieId) { viewCounts[movieId] += Math.floor(Math.random() * 5) + 1; }
        function startAutoRefresh() {
            counterInterval = setInterval(() => {
                moviesData.forEach(movie => incrementViewCount(movie.id));
                renderMovies();
            }, Math.random() * 10000 + 15000);
        }

        // DOM elements
        const moviesGrid = document.getElementById('moviesGrid');
        const modal = document.getElementById('videoModal');
        const closeModal = document.getElementById('closeModal');
        const modalMovieTitle = document.getElementById('modalMovieTitle');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const embedIframe = document.getElementById('embedIframe');
        const serverButtonsPanel = document.getElementById('serverButtonsPanel');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchStats = document.getElementById('searchStats');

        let currentFilter = 'all';
        let currentLanguage = 'en';
        let currentSearchQuery = '';
        let currentMovie = null;

        function getFilteredMovies() {
            let filtered = moviesData.filter(movie => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'en') return movie.lang === 'en' || movie.lang === 'both';
                if (currentFilter === 'ar') return movie.lang === 'ar' || movie.lang === 'both';
                return true;
            });
            if (currentSearchQuery.trim() !== '') {
                const q = currentSearchQuery.trim().toLowerCase();
                filtered = filtered.filter(m => m.titleEn.toLowerCase().includes(q) || m.titleAr.toLowerCase().includes(q));
            }
            return filtered;
        }
        function updateSearchStats(count) {
            if (!currentSearchQuery.trim()) { searchStats.innerHTML = ''; return; }
            searchStats.innerHTML = currentLanguage === 'en' ? `Found ${count} movie${count !== 1 ? 's' : ''} matching "${escapeHtml(currentSearchQuery)}"` : `تم العثور على ${count} فيلماً تطابق "${escapeHtml(currentSearchQuery)}"`;
        }
        function renderMovies() {
            const filtered = getFilteredMovies();
            if (filtered.length === 0) {
                moviesGrid.innerHTML = `<div class="no-results"><i class="fas fa-film-slash"></i><h3>${currentLanguage === 'en' ? 'No movies found' : 'لا توجد أفلام'}</h3><p>${currentLanguage === 'en' ? 'Try adjusting your search or filter.' : 'حاول تعديل البحث أو التصفية.'}</p></div>`;
                updateSearchStats(0);
                return;
            }
            updateSearchStats(filtered.length);
            moviesGrid.innerHTML = filtered.map(movie => {
                const displayTitle = currentLanguage === 'ar' ? movie.titleAr : movie.titleEn;
                const langClass = movie.lang === 'ar' ? 'ar' : (movie.lang === 'both' ? 'both' : 'en');
                const views = viewCounts[movie.id] || 0;
                return `<div class="movie-card" onclick="playMovie('${movie.id}')">
                            <div class="video-thumbnail"><img src="${movie.posterUrl}" alt="${displayTitle}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Poster'"><div class="play-overlay"><i class="fas fa-play-circle"></i></div></div>
                            <div class="movie-details"><div class="movie-title"><span>${displayTitle}</span><span class="movie-year">${movie.year}</span></div>
                            <div class="movie-meta"><span class="lang-badge ${langClass}">${movie.lang === 'en' ? 'EN' : movie.lang === 'ar' ? 'AR' : 'EN/AR'}</span>
                            <span class="watch-counter"><i class="fas fa-eye"></i> ${views.toLocaleString()}</span><i class="fas fa-video" style="color:#4CAF50;"></i></div></div></div>`;
            }).join('');
        }

        window.playMovie = function(movieId) {
            const movie = moviesData.find(m => m.id === movieId);
            if (!movie || !movie.servers || movie.servers.length === 0) { alert('No video source available.'); return; }
            incrementViewCount(movieId);
            renderMovies();
            currentMovie = movie;
            modal.classList.add('active');
            modalMovieTitle.textContent = currentLanguage === 'ar' ? movie.titleAr : movie.titleEn;
            serverButtonsPanel.innerHTML = '';
            movie.servers.forEach((server, idx) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn' + (idx === 0 ? ' active-server' : '');
                btn.innerHTML = `<i class="fas ${server.icon || 'fa-play-circle'}"></i> ${server.label}`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active-server'));
                    btn.classList.add('active-server');
                    embedIframe.src = server.url;
                });
                serverButtonsPanel.appendChild(btn);
            });
            embedIframe.src = movie.servers[0].url;
        };

        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            embedIframe.src = '';
            currentMovie = null;
        });
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal.click(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal.click(); });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMovies();
            });
        });

        window.toggleLanguage = function() {
            currentLanguage = currentLanguage === 'en' ? 'ar' : 'en';
            document.getElementById('langDisplay').textContent = currentLanguage === 'en' ? 'EN | عربي' : 'عربي | EN';
            document.getElementById('libraryTitle').textContent = currentLanguage === 'en' ? 'Movie Library / مكتبة الأفلام' : 'مكتبة الأفلام / Movie Library';
            renderMovies();
        };

        function handleSearchInput() { currentSearchQuery = searchInput.value; clearSearchBtn.style.display = currentSearchQuery.length > 0 ? 'block' : 'none'; renderMovies(); }
        function clearSearch() { searchInput.value = ''; currentSearchQuery = ''; clearSearchBtn.style.display = 'none'; renderMovies(); searchInput.focus(); }
        searchInput.addEventListener('input', handleSearchInput);
        clearSearchBtn.addEventListener('click', clearSearch);

        function buildMarqueeContent() {
            const track = document.getElementById('marqueeTrack');
            if (!track) return;
            let html = '';
            moviesData.forEach(m => { html += `<div class="marquee-item"><i class="fas fa-play-circle"></i><span class="film-name-en">${escapeHtml(m.titleEn)}</span><span class="separator-dot">/</span><span class="film-name-ar">${escapeHtml(m.titleAr)}</span><i class="fas fa-star"></i></div>`; });
            track.innerHTML = html + html;
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }

        initializeViewCounts();
        buildMarqueeContent();
        renderMovies();
        startAutoRefresh();
    })();
</script>
