        .container {

            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* header */
        .badini-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid #2f2b45;
            padding-bottom: 1rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: #e4b363;
        }

        .badini-title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .badini-title span {
            color: #e4b363;
            font-weight: 300;
        }

        .lang-tag {
            background: #2f2b45;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            gap: 10px;
            cursor: pointer;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
            border-left: 5px solid #e4b363;
            padding-left: 1rem;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid #4b446b;
            color: #dbd4f5;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-secondary:hover {
            border-color: #e4b363;
            color: #e4b363;
        }

        /* movies grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .movie-card {
            background: #1a1728;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #332e48;
            transition: 0.3s;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: #e4b363;
            box-shadow: 0 10px 30px rgba(228, 179, 99, 0.15);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: #0c0b14;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .movie-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay i {
            font-size: 3rem;
            color: #e4b363;
            text-shadow: 0 2px 10px black;
        }

        .movie-details {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .movie-year {
            background: #2f2b45;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #b9b3d6;
        }

        .movie-meta {
            display: flex;
            gap: 1rem;
            margin: 0.8rem 0;
            color: #a29cc0;
            font-size: 0.9rem;
        }

        .lang-badge {
            background: #e4b363;
            color: #12101c;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .lang-badge.ar {
            background: #1e9c8d;
        }

        .lang-badge.both {
            background: #9b87e0;
        }

        /* video player modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: white;
            padding: 0.5rem 1rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            padding: 0.5rem 1.5rem;
            line-height: 1;
        }

        .close-modal:hover {
            color: #e4b363;
        }

        .video-container {
            width: 100%;
            height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .video-container video,
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
        }

        #modalVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        #embedIframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* filter tabs */
        .filter-btn.active {
            background: #e4b363;
            color: #12101c;
            border-color: #e4b363;
        }
        
        .filter-btn.active:hover {
            background: #f7c579;
        }

        .filter-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .badini-header {
                flex-direction: column;
                text-align: center;
            }
            
            .movies-grid {
                grid-template-columns: 1fr;
            }
            
            .modal {
                padding: 0.5rem;
            }
            
            .video-container {
                height: calc(100vh - 80px);
            }
        }
    </style>

                videoUrl: 'https://uqload.net/embed-th7phxs8urvh.html',
                posterUrl: 'https://tye.ahwaktv.net/uploads/thumbs/5b1918b02-1.jpg',
                videoType: 'embed'
            },
            {
                id: '31',
                titleEn: 'Evil Dead 1986',
                titleAr: 'evil dead 1986',
                year: '1986',
                lang: 'both',
                videoUrl: 'https://uqload.net/embed-1afxc1464avr.html',
                posterUrl: 'https://tye.ahwaktv.net/uploads/thumbs/067ebc930-1.jpg',
                videoType: 'embed'
            },
            {
                id: '32',
                titleEn: 'Evil Dead 1981',
                titleAr: 'evil dead 1981',
                year: '1981',
                lang: 'both',
                videoUrl: 'https://uqload.net/embed-af95js8wixyz.html',
                posterUrl: 'https://tye.ahwaktv.net/uploads/thumbs/520de226f-1.jpg',
                videoType: 'embed'
            },
            {
                id: '33',
                titleEn: 'Maniac 2012',
                titleAr: 'maniac 2012',
                year: '2012',
                lang: 'both',
                videoUrl: 'https://www.vidspeeds.com:2096/embed-crhuszg4fmzs.html',
                posterUrl: 'https://yam.ahwaktv.net/uploads/thumbs/bcdc73f20-1.jpg',
                videoType: 'embed'
            },
            {
                id: '34',
                titleEn: 'i Saw The Devil',
                titleAr: 'i saw the devil',
                year: '2010',
                lang: 'both',
                videoUrl: 'https://www.vidspeeds.com/embed-zoiqylr8wg1x.html',
                posterUrl: 'https://wecima.ahwaktv.net/uploads/thumbs/8f641f3b9-1.jpg',
                videoType: 'embed'
            }
        ];

        // DOM elements
        const moviesGrid = document.getElementById('moviesGrid');
        const modal = document.getElementById('videoModal');
        const closeModal = document.getElementById('closeModal');
        const modalVideo = document.getElementById('modalVideo');
        const modalMovieTitle = document.getElementById('modalMovieTitle');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const videoContainer = document.getElementById('videoContainer');

        let currentFilter = 'all';
        let currentLanguage = 'en';

        // Create iframe element (the embed player)
        let embedIframe = document.createElement('iframe');
        embedIframe.id = 'embedIframe';
        embedIframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        embedIframe.allowFullscreen = true;
        embedIframe.style.display = 'none';
        embedIframe.setAttribute('frameborder', '0');
        embedIframe.setAttribute('loading', 'lazy');
        embedIframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
        embedIframe.setAttribute('scrolling', 'no');
        embedIframe.setAttribute('webkitallowfullscreen', 'true');
        embedIframe.setAttribute('mozallowfullscreen', 'true');
        videoContainer.appendChild(embedIframe);

        // Render movies grid
        function renderMovies() {
            const filteredMovies = movies.filter(movie => {
                if (currentFilter === 'all') return true;
                if (currentFilter === 'en') return movie.lang === 'en' || movie.lang === 'both';
                if (currentFilter === 'ar') return movie.lang === 'ar' || movie.lang === 'both';
                return true;
            });

            moviesGrid.innerHTML = filteredMovies.map(movie => {
                const displayTitle = currentLanguage === 'ar' ? movie.titleAr : movie.titleEn;
                const langClass = movie.lang === 'ar' ? 'ar' : (movie.lang === 'both' ? 'both' : 'en');
                
                return `
                    <div class="movie-card" onclick="playMovie('${movie.id}')">
                        <div class="video-thumbnail">
                            <img src="${movie.posterUrl}" alt="${displayTitle}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Poster'">
                            <div class="play-overlay">
                                <i class="fas fa-play-circle"></i>
                            </div>
                        </div>
                        <div class="movie-details">
                            <div class="movie-title">
                                <span>${displayTitle}</span>
                                <span class="movie-year">${movie.year}</span>
                            </div>
                            <div class="movie-meta">
                                <span class="lang-badge ${langClass}">
                                    ${movie.lang === 'en' ? 'EN' : movie.lang === 'ar' ? 'AR' : 'EN/AR'}
                                </span>
                                <i class="fas fa-video" style="color:#4CAF50;" title="video available"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Play movie function – uses the embed iframe
        window.playMovie = function(movieId) {
            const movie = movies.find(m => m.id === movieId);
            if (!movie || !movie.videoUrl) {
                alert('No video available for this film yet.');
                return;
            }

            modal.classList.add('active');
            modalMovieTitle.textContent = currentLanguage === 'ar' ? movie.titleAr : movie.titleEn;
            
            // Hide native video element, show iframe
            modalVideo.style.display = 'none';
            modalVideo.pause();
            modalVideo.src = '';
            
            // Set the embed iframe src to the videoUrl
            embedIframe.style.display = 'block';
            embedIframe.src = movie.videoUrl;
            
            // For ID 6, ensure all attributes are properly set
            if (movie.id === '6') {
                embedIframe.setAttribute('scrolling', 'no');
                embedIframe.setAttribute('frameborder', '0');
                embedIframe.setAttribute('allowfullscreen', 'true');
                embedIframe.setAttribute('webkitallowfullscreen', 'true');
                embedIframe.setAttribute('mozallowfullscreen', 'true');
            }
        };

        // Close modal
        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
            
            // Stop video
            modalVideo.pause();
            modalVideo.src = '';
            modalVideo.style.display = 'none';
            
            // Clear iframe
            embedIframe.src = '';
            embedIframe.style.display = 'none';
        });

        // Click outside to close
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal.click();
            }
        });

        // Filter functionality
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderMovies();
            });
        });

        // Language toggle function
        window.toggleLanguage = function() {
            currentLanguage = currentLanguage === 'en' ? 'ar' : 'en';
            document.getElementById('langDisplay').textContent = currentLanguage === 'en' ? 'EN | عربي' : 'عربي | EN';
            document.getElementById('libraryTitle').textContent = currentLanguage === 'en' ? 'Movie Library / مكتبة الأفلام' : 'مكتبة الأفلام / Movie Library';
            renderMovies();
        };

        // Escape key to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                closeModal.click();
            }
        });

        // Initial render
        renderMovies();
    })();
</script>
</body>
</html>
